# LoRA 微调配置 - Qwen3-VL-8B 视觉语言模型
# 用于全景图像条件生成 (panorama -> JSON)
# 硬件要求: 建议使用 4-8x GPU (每张 40GB+ 显存)

# 模型配置
model_name: "Qwen/Qwen2-VL-7B-Instruct"  # 或 "Qwen/Qwen2.5-VL-7B-Instruct"
training_mode: "lora"
is_vl_model: true  # 显式指定为视觉语言模型

# 数据配置
# 方式1: 单个batch目录
# batch_dirs:
#   base_dir: "/path/to/panorama_data"
#   train_batches: "1-20"
#   eval_batches: [0]

# 方式2: 多个batch目录
batch_dirs:
  - base_dir: "/path/to/panorama_data_qwen_vl"
    train_batches: "1-20"
    eval_batches: [0]

# 方式3: 使用单个数据集文件
# dataset_path: "/path/to/your/panorama_dataset"

max_length: 4096  # VL模型需要为图像token预留空间
pad_to_max_length: false  # VL模型不建议填充到最大长度

# LoRA 配置
lora_config:
  r: 64                # LoRA秩
  lora_alpha: 16       # LoRA缩放因子
  lora_dropout: 0.1    # Dropout率
  target_modules:      # 只对LLM部分应用LoRA (不包括视觉编码器)
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"

# 量化配置（可选，用于节省显存）
load_in_4bit: false     # 4-bit量化，可大幅降低显存
load_in_8bit: false     # 8-bit量化

# 训练超参数
num_epochs: 3
per_device_train_batch_size: 1      # VL模型需要更多显存，建议batch_size=1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16      # 梯度累积

# 优化器配置
optimizer: "adamw"
learning_rate: 1.0e-4               # VL模型建议较低学习率
weight_decay: 0.01
adam_betas: [0.9, 0.999]
adam_epsilon: 1.0e-8
max_grad_norm: 1.0

# 学习率调度器
lr_scheduler_type: "cosine"
warmup_ratio: 0.05

# 模型设置
torch_dtype: "bfloat16"
use_flash_attention: true

# 分布式训练
mixed_precision: "bf16"
gradient_checkpointing: true

# 日志和保存
output_dir: "./outputs/lora_qwen_vl_panorama"
logging_steps: 50
save_steps: 500
eval_steps: 500

# 日志记录配置
log_with: "tensorboard"
project_name: "llm-finetuning-vl"

# 评估
do_eval: true

# 可重现性
seed: 42

# DataLoader
dataloader_num_workers: 2  # VL模型图像处理可能需要更少workers

# Tokenizer/Processor设置
padding_side: "right"

# 说明:
# 1. VL模型训练需要更多显存，建议使用较大显存的GPU
# 2. 图像会被processor处理成pixel_values传入模型
# 3. 数据准备时使用 --mode panorama --image_dir /path/to/images
# 4. 训练数据应包含 'image' 列 (使用HuggingFace Image feature)

